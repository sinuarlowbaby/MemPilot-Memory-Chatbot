services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mem0_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API  (matches QDRANT_URL in .env)
      - "6334:6334"   # gRPC
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT__SERVICE__API_KEY}
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: mem0_redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # matches REDIS_URL in .env
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis_insight
    restart: unless-stopped
    ports:
      - "5540:5540"
    volumes:
      - redis-insight-data:/data
    depends_on:
      - redis
  neo4j:
    image: neo4j:5-community
    container_name: mem0_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Neo4j Browser Console
      - "7687:7687"   # Bolt Port (used for programmatic connection)
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_data:
  redis_data:
  redis-insight-data:
  neo4j_data:
